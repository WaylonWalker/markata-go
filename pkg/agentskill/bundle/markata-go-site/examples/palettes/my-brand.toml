[palette]
name = "My Brand"
variant = "dark"
author = "Your Name"
description = "Starter project palette for a markata-go site"

[palette.colors]
base = "#0f172a"
surface = "#1e293b"
surface-alt = "#334155"
text = "#f8fafc"
muted = "#cbd5e1"
primary = "#8b5cf6"
primary-light = "#a78bfa"
link-blue = "#38bdf8"
green = "#34d399"
yellow = "#fbbf24"
red = "#f87171"

[palette.semantic]
text-primary = "text"
text-secondary = "muted"
text-muted = "muted"
bg-primary = "base"
bg-secondary = "surface"
bg-surface = "surface"
bg-elevated = "surface-alt"
accent = "primary"
accent-hover = "primary-light"
link = "link-blue"
link-hover = "primary-light"
success = "green"
warning = "yellow"
error = "red"
info = "link-blue"
border = "surface-alt"
border-focus = "primary"

[palette.components]
code-bg = "surface"
code-text = "text"
button-primary-bg = "primary"
button-primary-text = "base"
button-secondary-bg = "surface-alt"
button-secondary-text = "text"
nav-bg = "base"
nav-text = "text"
nav-active = "primary"
card-bg = "surface"
card-border = "surface-alt"
card-shadow = "base"
