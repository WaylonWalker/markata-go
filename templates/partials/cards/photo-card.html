{# Photo preview is intentionally only figure/figcaption #}
{% with post.image|media_url:post.video as media_src %}
{% if media_src %}
{% with media_src|with_size:"1200,675" as sized_media %}
<figure class="photo-figure h-entry">
  <a href="{{ post.href }}" class="u-url">
    {% if media_src|is_video %}
    {% set poster_candidate = post | poster_url:media_src %}
    <video class="u-video" autoplay muted loop playsinline{% if poster_candidate %} poster="{{ poster_candidate | with_size:"1200,675" }}"{% endif %}>
      <source src="{{ sized_media }}"{% with media_src|video_mime as mime %}{% if mime %} type="{{ mime }}"{% endif %}{% endwith %}>
    </video>
    {% else %}
    <img src="{{ sized_media }}" alt="{{ post.title | default:post.description | default:'Photo' }}" class="u-photo" width="1200" height="675" loading="lazy">
    {% endif %}
  </a>
  <figcaption class="p-summary">{{ post.description | default:post.title | default:'Photo' }}</figcaption>
</figure>
{% endwith %}
{% endif %}
{% endwith %}
