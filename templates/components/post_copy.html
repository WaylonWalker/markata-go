{% if post_copy_payloads %}
<div class="post-copy" data-post-copy>
    <details class="post-copy__details">
        <summary class="post-copy__summary"><svg class="post-copy__summary-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false"><path d="M9 9V4a1 1 0 0 1 1-1h9a1 1 0 0 1 1 1v11a1 1 0 0 1-1 1h-5v-2h4V5h-7v4H9Zm-4 3h9a1 1 0 0 1 1 1v7a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-7a1 1 0 0 1 1-1Zm1 2v5h7v-5H6Z" fill="currentColor"/></svg><span>Copy this post</span></summary>
        <div class="post-copy__menu" role="menu" aria-label="Copy this post options">
            <button type="button" class="post-copy__option" data-copy-kind="url" role="menuitem">URL</button>
            <button type="button" class="post-copy__option" data-copy-kind="rich" role="menuitem">Rich</button>
            <button type="button" class="post-copy__option" data-copy-kind="markdown" role="menuitem">Markdown</button>
            <button type="button" class="post-copy__option" data-copy-kind="text" role="menuitem">Text</button>
        </div>
    </details>
    <span class="post-copy__status" aria-live="polite"></span>
    <script type="application/json" class="post-copy__payload">{{ post_copy_payloads_json | safe }}</script>
</div>

<script>
(function() {
    if (window.__markataPostCopyBound) {
        return;
    }
    window.__markataPostCopyBound = true;

    function copyText(text) {
        if (!text) {
            return Promise.reject(new Error('missing copy text'));
        }
        if (navigator.clipboard && navigator.clipboard.writeText) {
            return navigator.clipboard.writeText(text);
        }
        var textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.setAttribute('readonly', '');
        textarea.style.position = 'absolute';
        textarea.style.left = '-9999px';
        document.body.appendChild(textarea);
        textarea.select();
        textarea.setSelectionRange(0, textarea.value.length);
        var result = document.execCommand('copy');
        document.body.removeChild(textarea);
        return result ? Promise.resolve() : Promise.reject(new Error('execCommand failed'));
    }

    function setAbsoluteURLs(container, rootURL) {
        var attrs = ['href', 'src', 'poster'];
        attrs.forEach(function(attr) {
            var selector = '[' + attr + ']';
            container.querySelectorAll(selector).forEach(function(node) {
                var value = node.getAttribute(attr);
                if (!value) {
                    return;
                }
                try {
                    node.setAttribute(attr, new URL(value, rootURL).href);
                } catch (err) {
                }
            });
        });
    }

    function removeCopyNoise(container) {
        container.querySelectorAll('.anchor, .heading-anchor, [aria-hidden="true"], [role="presentation"]').forEach(function(node) {
            node.remove();
        });

        container.querySelectorAll('h1 a[href^="#"], h2 a[href^="#"], h3 a[href^="#"], h4 a[href^="#"], h5 a[href^="#"], h6 a[href^="#"]').forEach(function(node) {
            node.remove();
        });

        container.querySelectorAll('pre code').forEach(function(node) {
            var language = '';
            (node.className || '').split(/\s+/).forEach(function(className) {
                if (className.indexOf('language-') === 0) {
                    language = className.slice('language-'.length);
                }
            });

            var pre = node.parentNode;
            pre.setAttribute('data-copy-code-block', 'true');
            if (language) {
                pre.setAttribute('data-language', language);
                node.setAttribute('data-language', language);
            }

            node.textContent = (node.textContent || '').replace(/\n+$/, '');
        });
    }

    function applyRichStyles(container) {
        var styles = {
            h1: 'margin:0 0 16px;font-size:2em;font-weight:700;line-height:1.2;',
            h2: 'margin:28px 0 14px;font-size:1.5em;font-weight:700;line-height:1.25;',
            h3: 'margin:24px 0 12px;font-size:1.25em;font-weight:700;line-height:1.3;',
            h4: 'margin:20px 0 10px;font-size:1.1em;font-weight:700;line-height:1.35;',
            h5: 'margin:18px 0 8px;font-size:1em;font-weight:700;line-height:1.4;',
            h6: 'margin:16px 0 8px;font-size:0.95em;font-weight:700;line-height:1.4;',
            p: 'margin:0 0 14px;line-height:1.6;white-space:normal;',
            ul: 'margin:0 0 16px;padding-left:24px;',
            ol: 'margin:0 0 16px;padding-left:24px;',
            li: 'margin:0 0 6px;',
            blockquote: 'margin:20px 0;padding:4px 0 4px 16px;border-left:3px solid #cbd5e1;',
            pre: 'margin:16px 0;padding:12px 14px;white-space:pre-wrap;overflow:auto;font-family:ui-monospace,SFMono-Regular,Consolas,monospace;',
            code: 'font-family:ui-monospace,SFMono-Regular,Consolas,monospace;white-space:pre-wrap;',
            a: 'text-decoration:underline;',
            hr: 'margin:24px 0;',
            img: 'max-width:100%;height:auto;',
            table: 'border-collapse:collapse;margin:16px 0;',
            th: 'border:1px solid #d0d7de;padding:6px 10px;text-align:left;',
            td: 'border:1px solid #d0d7de;padding:6px 10px;text-align:left;'
        };

        Object.keys(styles).forEach(function(selector) {
            container.querySelectorAll(selector).forEach(function(node) {
                var existing = node.getAttribute('style');
                node.setAttribute('style', styles[selector] + (existing ? existing : ''));
            });
        });

        container.querySelectorAll('[data-copy-code-block]').forEach(function(node) {
            var existing = node.getAttribute('style');
            node.setAttribute('style', 'margin:16px 0;padding:12px 14px;white-space:pre-wrap;overflow:auto;background:#f8fafc;' + (existing ? existing : ''));
        });
    }

    function buildRichPayload(root) {
        var data = readPayload(root);
        var title = data.title || document.title;
        var url = data.url || window.location.href;
        var article = document.querySelector('.post .post-content');
        var wrapper = document.createElement('div');
        var heading = document.createElement('h1');
        var source = document.createElement('p');
        var link = document.createElement('a');

        heading.textContent = title;
        link.href = url;
        link.textContent = url;
        source.appendChild(link);
        wrapper.appendChild(heading);
        wrapper.appendChild(source);

        if (article) {
            var content = article.cloneNode(true);
            removeCopyNoise(content);
            setAbsoluteURLs(content, url);
            applyRichStyles(content);
            wrapper.appendChild(content);
        }

        heading.setAttribute('style', 'margin:0 0 16px;font-size:2em;font-weight:700;line-height:1.2;');
        source.setAttribute('style', 'margin:0 0 18px;line-height:1.5;white-space:normal;');
        link.setAttribute('style', 'text-decoration:underline;');

        return {
            html: wrapper.innerHTML,
            text: data.text || url
        };
    }

    function readPayload(root) {
        var payloadNode = root.querySelector('.post-copy__payload');
        var raw = payloadNode ? payloadNode.textContent : '{}';
        try {
            return JSON.parse(raw);
        } catch (err) {
            return {};
        }
    }

    function copyRich(root) {
        var payload = buildRichPayload(root);
        if (window.ClipboardItem && navigator.clipboard && navigator.clipboard.write) {
            var item = new ClipboardItem({
                'text/html': new Blob([payload.html], { type: 'text/html' }),
                'text/plain': new Blob([payload.text], { type: 'text/plain' })
            });
            return navigator.clipboard.write([item]).catch(function() {
                return copyText(payload.text);
            });
        }
        return copyText(payload.text);
    }

    function feedbackMessage(kind) {
        if (kind === 'url') {
            return 'URL copied';
        }
        if (kind === 'rich') {
            return 'Rich copy ready';
        }
        if (kind === 'markdown') {
            return 'Markdown copied';
        }
        return 'Text copied';
    }

    document.addEventListener('click', function(event) {
        var button = event.target.closest('.post-copy__option');
        if (!button) {
            return;
        }
        var root = button.closest('[data-post-copy]');
        if (!root) {
            return;
        }
        var status = root.querySelector('.post-copy__status');
        var details = root.querySelector('.post-copy__details');
        var kind = button.dataset.copyKind;
        var data = readPayload(root);
        var action;

        if (kind === 'url') {
            action = copyText(data.url || window.location.href);
        } else if (kind === 'rich') {
            action = copyRich(root);
        } else if (kind === 'markdown') {
            action = copyText(data.markdown || '');
        } else {
            action = copyText(data.text || '');
        }

        action.then(function() {
            root.dataset.copyState = 'copied';
            if (status) {
                status.textContent = feedbackMessage(kind);
            }
            if (details) {
                details.open = false;
            }
            window.setTimeout(function() {
                if (status) {
                    status.textContent = '';
                }
                root.dataset.copyState = '';
            }, 1800);
        }).catch(function() {
            root.dataset.copyState = 'error';
            if (status) {
                status.textContent = 'Unable to copy';
            }
            window.setTimeout(function() {
                if (status) {
                    status.textContent = '';
                }
                root.dataset.copyState = '';
            }, 1800);
        });
    });
})();
</script>
{% endif %}
