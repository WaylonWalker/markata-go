apiVersion: v1
kind: ConfigMap
metadata:
  name: "{{ .Values.project_identifier }}-notes-nginx-config"
  namespace: "{{ include "markata-notes.namespace" . }}"
  labels:
    {{- include "markata-notes.labels" . | nindent 4 }}
data:
  nginx.conf: |
    user nginx;
    worker_processes auto;
    error_log /var/log/nginx/error.log warn;
    pid /var/run/nginx.pid;

    events {
      worker_connections 1024;
    }

    http {
      include /etc/nginx/mime.types;
      default_type application/octet-stream;

      log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" "$http_x_forwarded_for"';

      access_log /var/log/nginx/access.log main;
      sendfile on;
      tcp_nopush on;
      tcp_nodelay on;
      keepalive_timeout 65;
      client_max_body_size 20M;
      gzip on;
      gzip_vary on;
      gzip_proxied any;
      gzip_comp_level 6;
      gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml application/atom+xml image/svg+xml;

      server {
        listen 80;
        server_name _;
        root /usr/share/nginx/html/current;

        {{- if .Values.site.use404Page }}
        error_page 404 /404.html;

        location = /404.html {
          internal;
        }
        {{- end }}

        location / {
          {{- if .Values.site.use404Page }}
          try_files $uri $uri/ $uri.html =404;
          {{- else }}
          try_files $uri $uri/ /index.html =404;
          {{- end }}
        }

        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|avif|webp)$ {
          expires 365d;
          add_header Cache-Control "public, immutable";
        }

        location ~* \.html?$ {
          expires -1;
          add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
      }
    }
