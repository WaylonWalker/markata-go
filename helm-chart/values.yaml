project_identifier: example
project_name: example
environment: prod

imagePullSecrets:
  - name: global-regcred

serviceAccount:
  create: true
  name: ""
  automountServiceAccountToken: false

nodeSelector: {}

podSecurityContext:
  seccompProfile:
    type: RuntimeDefault

siteSecurityContext:
  allowPrivilegeEscalation: false

searchSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

networkPolicy:
  enabled: true

offline:
  enabled: true
  bundledAssetsCacheDir: /usr/local/share/markata-go/assets-cache
  bundledMermaidDir: /usr/local/share/markata-go/mermaid

build:
  enabled: true
  schedule: "02 23 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 6
  failedJobsHistoryLimit: 6
  ttlSecondsAfterFinished: 259200
  activeDeadlineSeconds: 1800
  # Keep public scheduled builds accurate by default. Enable only for preview-style loops.
  fast: false
  notify:
    enabled: false
    url: ""
  mermaid:
    mode: client
  lock:
    enabled: true
    dirName: ".markata-notes-build-lock"
    pollIntervalSeconds: 2
    staleAfterBufferSeconds: 600
  releases:
    keep: 3
  fetchImage:
    name: ghcr.io/waylonwalker/markata-go-builder
    tag: "latest"
    pullPolicy: IfNotPresent
  builderImage:
    name: ghcr.io/waylonwalker/markata-go-builder
    tag: "latest"
    pullPolicy: IfNotPresent
  proxy:
    http: ""
    https: ""
  cacheDir: /data/site/.cache/xdg
  extraEnv: []
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
      ephemeral-storage: 1Gi
    limits:
      memory: 2Gi
      ephemeral-storage: 4Gi

builderAdmin:
  enabled: false
  host: 0.0.0.0
  port: 8080
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  watch:
    enabled: true
    debounce: 2s
  # Queued builder-admin builds default to full builds so blogroll, mentions, and other
  # user-facing outputs stay live unless an environment explicitly opts into faster previews.
  fast: false
  mermaidMode: client
  releases:
    keep: 25
  history:
    successfulBuilds: 50
    failedBuilds: 100
    refreshRuns: 100
  buildTimeoutSeconds: 7200
  historyDir: /data/site/.builder-admin
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
      ephemeral-storage: 500Mi
    limits:
      memory: 1Gi
      ephemeral-storage: 2Gi
  refreshTasks: []

site:
  replicaCount: 1
  image:
    name: nginx
    tag: "1.27.5-alpine"
    pullPolicy: IfNotPresent
  use404Page: false
  resources:
    requests:
      cpu: 20m
      memory: 128Mi
      ephemeral-storage: 500Mi
    limits:
      memory: 1Gi
      ephemeral-storage: 1Gi

search:
  enabled: true
  replicaCount: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  configPath: /data/source/markata-go.toml
  image:
    name: ghcr.io/waylonwalker/markata-go-builder
    tag: "latest"
    pullPolicy: IfNotPresent
  mode: watch-content
  writableIndexStorage:
    mode: emptyDir
  port: 3001
  watchDebounce: 2s
  waitForSource:
    enabled: true
    timeoutSeconds: 900
    pollIntervalSeconds: 2
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 64Mi
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
      ephemeral-storage: 500Mi
    limits:
      memory: 1Gi
      ephemeral-storage: 1Gi
  extraEnv: []

sourceArchive:
  bucket: "example-bucket"
  location: "/example-share/outputs/example"
  key: "source.tar.gz"
  encryption:
    enabled: false

markataEncryption:
  secretName: "markata-go-encryption"
  sealedSecret:
    enabled: false
    encryptedData:
      MARKATA_GO_ENCRYPTION_KEY_DEFAULT: ""

aws:
  existingSecretName: aws-default
  sealedSecret:
    enabled: false
    encryptedData: {}

storage:
  source:
    mode: pvc
    storageClassName: longhorn
    size: 10Gi
    accessModes:
      - ReadWriteMany
    pvcNameSuffix: ""
    hostPath:
      path: ""
      type: Directory
  site:
    mode: pvc
    storageClassName: longhorn
    size: 10Gi
    accessModes:
      - ReadWriteMany
    pvcNameSuffix: ""
    hostPath:
      path: ""
      type: DirectoryOrCreate
  search:
    storageClassName: longhorn
    size: 5Gi
    accessModes:
      - ReadWriteOnce
    pvcNameSuffix: ""
  cache:
    enabled: false
    mode: pvc
    storageClassName: longhorn
    size: 10Gi
    accessModes:
      - ReadWriteOnce
    pvcNameSuffix: ""
    mountPath: /data/cache
    hostPath:
      path: ""
      type: DirectoryOrCreate

ingress:
  enabled: true
  host: ""
  ingressClassName: ""
  annotations: {}
  tls:
    enabled: false
    secretName: ""
  extraCnames: []
  searchPath: /api/search
  auth:
    enabled: false
    provider: traefik
    mode: redirect
    url: ""
    internalUrl: ""
    access: authenticated
    roleName: ""
    responseHeaders:
      - Remote-User
      - Remote-Email
      - Remote-Name
      - Remote-Roles
